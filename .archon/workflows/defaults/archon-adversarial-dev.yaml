name: archon-adversarial-dev
description: |
  Use when: User wants to build a complete application from scratch using adversarial development.
  Triggers: "adversarial dev", "adversarial development", "build with adversarial", "gan dev",
            "adversarial build", "build app adversarially", "adversarial coding".
  Does: Three-role GAN-inspired development — Planner creates spec with sprints, then a state-machine
        loop alternates between Generator (builds code) and Evaluator (attacks it) with hard pass/fail
        thresholds. The evaluator's job is to BREAK what the generator builds. If any criterion scores
        below 7/10, the sprint goes back to the generator with adversarial feedback. Stops on sprint
        failure after max retries.
  NOT for: Bug fixes, PR reviews, refactoring existing code, simple one-off tasks.

  Based on Anthropic's harness design article for long-running application development.
  Separates planning, building, and evaluation into distinct roles with adversarial tension.
provider: claude
model: sonnet

nodes:
  # ─── Phase 1: Planning ───────────────────────────────────────────────
  - id: plan
    prompt: |
      You are a product planning expert. Your job is to take a short user prompt and expand it
      into a comprehensive product specification.

      ## User Request

      $ARGUMENTS

      ## Your Task

      Write a comprehensive product specification to the file `$ARTIFACTS_DIR/spec.md` using the Write tool.

      The spec MUST include ALL of the following sections:

      ### 1. Product Overview
      What the product does, who it's for, core value proposition.

      ### 2. Tech Stack
      Specific technologies, frameworks, and libraries. Be opinionated — pick concrete choices,
      not "a modern framework." Include exact package names and versions where relevant.

      ### 3. Design Language
      Visual style, specific color hex codes, typography choices, component patterns, spacing system.

      ### 4. Feature List
      Every feature organized by priority. Be exhaustive.

      ### 5. Sprint Plan
      Features broken into 3-6 sprints, ordered by dependency and importance:
      - **Sprint 1** should establish the foundation (project setup, core data models, basic UI shell)
      - Each subsequent sprint builds on the previous
      - Label each sprint clearly: "Sprint 1: Foundation", "Sprint 2: Core Features", etc.
      - List the specific features/deliverables for each sprint

      Be specific and opinionated. The more concrete the spec (exact API paths, specific color codes,
      named libraries), the better the generator can build and the evaluator can test.

      IMPORTANT: Write the spec to `$ARTIFACTS_DIR/spec.md` using the Write tool. Do NOT just output
      it as conversation text.
    allowed_tools: [Read, Write, Glob, Grep]

  # ─── Phase 2: Workspace Initialization ───────────────────────────────
  - id: init-workspace
    depends_on: [plan]
    bash: |
      ARTIFACTS="$ARTIFACTS_DIR"

      # Create directory structure for harness communication
      mkdir -p "$ARTIFACTS/contracts"
      mkdir -p "$ARTIFACTS/feedback"
      mkdir -p "$ARTIFACTS/app"

      # Initialize isolated git repo in app directory
      cd "$ARTIFACTS/app"
      git init -q
      git commit --allow-empty -m "Initial commit: adversarial-dev workspace" -q

      # Extract sprint count from spec (find highest "Sprint N" reference)
      SPEC="$ARTIFACTS/spec.md"
      SPRINT_COUNT=3
      if [ -f "$SPEC" ]; then
        FOUND=$(grep -ioE 'sprint\s+[0-9]+' "$SPEC" | grep -oE '[0-9]+' | sort -n | tail -1)
        if [ -n "$FOUND" ] && [ "$FOUND" -ge 1 ] 2>/dev/null; then
          SPRINT_COUNT=$FOUND
        fi
        if [ "$SPRINT_COUNT" -gt 10 ]; then
          SPRINT_COUNT=10
        fi
      fi

      # Write initial state machine file
      cat > "$ARTIFACTS/state.json" << 'STATEEOF'
      {
        "phase": "negotiating",
        "sprint": 1,
        "totalSprints": SPRINT_COUNT_PLACEHOLDER,
        "retry": 0,
        "maxRetries": 3,
        "passThreshold": 7,
        "completedSprints": [],
        "status": "running"
      }
      STATEEOF
      sed -i "s/SPRINT_COUNT_PLACEHOLDER/$SPRINT_COUNT/" "$ARTIFACTS/state.json"

      echo "{\"totalSprints\": $SPRINT_COUNT, \"appDir\": \"$ARTIFACTS/app\", \"artifactsDir\": \"$ARTIFACTS\"}"
    timeout: 30000

  # ─── Phase 3: Adversarial Sprint Loop ────────────────────────────────
  #
  # State machine driven by $ARTIFACTS_DIR/state.json
  # Each iteration plays ONE role: negotiator, generator, or evaluator
  # fresh_context ensures genuine separation between roles
  #
  - id: adversarial-sprint
    depends_on: [init-workspace]
    idle_timeout: 600000
    model: claude-opus-4-6[1m]
    loop:
      prompt: |
        # Adversarial Development — Sprint Loop

        You are part of a GAN-inspired adversarial development system with three distinct roles.
        Each iteration you play ONE role, determined by the current phase in the state file.

        ## FIRST: Read State

        Read `$ARTIFACTS_DIR/state.json` to determine:
        - `phase` — which role you play this iteration
        - `sprint` — current sprint number
        - `totalSprints` — how many sprints total
        - `retry` — current retry attempt (0 = first try)
        - `maxRetries` — max retries before hard failure (default 3)
        - `passThreshold` — minimum score to pass (default 7)

        Then read `$ARTIFACTS_DIR/spec.md` for product context.

        ## Directory Layout

        - App source code: `$ARTIFACTS_DIR/app/`
        - Sprint contracts: `$ARTIFACTS_DIR/contracts/sprint-{N}.json`
        - Evaluation feedback: `$ARTIFACTS_DIR/feedback/sprint-{N}-round-{R}.json`
        - State machine: `$ARTIFACTS_DIR/state.json`

        ---

        ## ROLE: CONTRACT NEGOTIATOR (phase = "negotiating")

        You negotiate the success criteria for the current sprint. Play BOTH sides sequentially:

        **Step 1 — Generator's Proposal:**
        Read the spec carefully. Identify what Sprint {N} should deliver based on the sprint plan.
        Propose a sprint contract with 5-15 specific, testable criteria.

        Each criterion MUST be concrete and verifiable. Examples:
        - GOOD: "GET /api/tasks returns 200 with JSON array; each item has id (number), title (string), status (string), createdAt (ISO date)"
        - GOOD: "Clicking the Add Task button opens a modal with title input, priority dropdown (low/medium/high), and due date picker"
        - BAD: "The API works well"
        - BAD: "Tasks can be managed"

        **Step 2 — Evaluator's Tightening:**
        Now review your proposal as an adversary. For EACH criterion ask:
        - Is it specific enough to test programmatically?
        - What edge cases are missing? (empty inputs, special characters, concurrent requests)
        - Is the bar high enough, or would sloppy code pass?

        Tighten vague criteria. Add edge cases. Raise the bar.

        **Write the final contract** to `$ARTIFACTS_DIR/contracts/sprint-{N}.json`:
        ```json
        {
          "sprintNumber": <N>,
          "features": ["feature1", "feature2", ...],
          "criteria": [
            {
              "name": "short-kebab-name",
              "description": "Specific, testable description of what must be true",
              "threshold": 7
            }
          ]
        }
        ```

        **Update state.json**: Set `"phase": "building"`. Keep all other fields unchanged.

        ---

        ## ROLE: GENERATOR (phase = "building")

        You are a software engineer. Build features that MUST survive an adversarial evaluator
        who will actively try to break your code.

        **Read these files:**
        1. `$ARTIFACTS_DIR/spec.md` — full product spec (design language, tech stack, all features)
        2. `$ARTIFACTS_DIR/contracts/sprint-{N}.json` — the contract you must satisfy
        3. If `retry` > 0: read `$ARTIFACTS_DIR/feedback/sprint-{N}-round-{R-1}.json` for the
           evaluator's previous feedback

        **If this is a RETRY (retry > 0):**
        Read the feedback CAREFULLY. Every failed criterion must be addressed.
        - If scores were close (5-6) and trending up: REFINE your approach
        - If scores were low (1-4) or the approach is fundamentally broken: PIVOT to a new strategy
        - Address EVERY feedback item — the evaluator WILL check
        - Re-verify each fix by running the code before committing

        **Build rules:**
        - All code goes in `$ARTIFACTS_DIR/app/`
        - Build ONE feature at a time, verify it works, then commit:
          ```bash
          cd $ARTIFACTS_DIR/app && git add -A && git commit -m "feat: description of what was built"
          ```
        - Install dependencies as needed (npm/bun/pip/etc)
        - Test your code — start the server, hit the endpoints, verify the UI renders
        - Think about what the evaluator will attack: edge cases, error handling, input validation
        - Build defensively — the evaluator's job is to break you

        **Update state.json**: Set `"phase": "evaluating"`. Keep all other fields unchanged.

        ---

        ## ROLE: EVALUATOR (phase = "evaluating")

        You are an ADVERSARIAL QA agent. Your mandate is to BREAK what the generator built.
        You are not helpful. You are not generous. You are an attacker.

        **CRITICAL CONSTRAINTS:**
        - You are READ-ONLY for source code. NEVER use Write or Edit on files in `$ARTIFACTS_DIR/app/`.
        - You MAY use Bash to run the app, curl endpoints, run test scripts, check behavior.
        - You MUST kill any background processes (servers, watchers) you start BEFORE finishing.
          Use: `pkill -f "node\|bun\|python\|npm" 2>/dev/null || true`
        - You MUST score EVERY criterion in the contract. No skipping.

        **Scoring guidelines:**
        - **9-10**: Exceptional. Works perfectly including edge cases the contract didn't mention.
        - **7-8**: Solid. Meets the criterion as stated. Minor polish issues at most.
        - **5-6**: Partial. Core functionality exists but fails important edge cases or has bugs.
        - **3-4**: Weak. Barely functional. Major gaps.
        - **1-2**: Broken. Does not work or is not implemented.

        Do NOT grade on a curve. Do NOT give benefit of the doubt. A 7 means "genuinely meets the bar."
        If something is broken, say it's broken.

        **Read**: `$ARTIFACTS_DIR/contracts/sprint-{N}.json` for the criteria.

        **For each criterion:**
        1. Read the relevant source code
        2. Run the application (start server, test endpoints, check rendered UI)
        3. Try to BREAK it — invalid inputs, missing fields, edge cases, error handling gaps
        4. Score it honestly

        **Write evaluation** to `$ARTIFACTS_DIR/feedback/sprint-{N}-round-{R}.json`:
        ```json
        {
          "passed": <true if ALL scores >= passThreshold, false otherwise>,
          "scores": {
            "criterion-name": <score>,
            ...
          },
          "feedback": [
            {
              "criterion": "criterion-name",
              "score": <1-10>,
              "details": "Specific findings. Include file paths, line numbers, exact error messages, curl commands that failed."
            }
          ],
          "overallSummary": "What worked, what didn't, what the generator must fix."
        }
        ```

        **Determine pass/fail** — `passed` is `true` ONLY if every single score >= `passThreshold`.

        **Update state.json based on result:**

        **If PASSED (all criteria >= threshold):**
        - Add current sprint number to `completedSprints` array
        - If `sprint` < `totalSprints`: set `"phase": "negotiating"`, increment `"sprint"` by 1, set `"retry": 0`
        - If `sprint` == `totalSprints`: set `"phase": "complete"`, set `"status": "complete"`

        **If FAILED:**
        - If `retry` < `maxRetries`: set `"phase": "building"`, increment `"retry"` by 1
        - If `retry` >= `maxRetries`: set `"phase": "failed"`, set `"status": "failed"`

        **IMPORTANT**: Kill all background processes before finishing:
        ```bash
        pkill -f "node|bun|python|npm|next|vite|webpack" 2>/dev/null || true
        ```

        ---

        ## COMPLETION

        After updating state.json, check the `status` field:
        - If `"status": "complete"` → all sprints passed! Output: `<promise>ALL_SPRINTS_COMPLETE</promise>`
        - If `"status": "failed"` → sprint failed after max retries. Output: `<promise>ALL_SPRINTS_COMPLETE</promise>`
        - If `"status": "running"` → more work to do. Do NOT output any completion signal.

      until: ALL_SPRINTS_COMPLETE
      max_iterations: 60
      fresh_context: true
      until_bash: |
        grep -qE '"status"\s*:\s*"(complete|failed)"' "$ARTIFACTS_DIR/state.json"

  # ─── Phase 4: Report ─────────────────────────────────────────────────
  - id: report
    depends_on: [adversarial-sprint]
    trigger_rule: all_done
    context: fresh
    model: haiku
    prompt: |
      You are a project reporter. Generate a comprehensive summary of the adversarial development run.

      ## Read ALL of these files:
      1. `$ARTIFACTS_DIR/state.json` — final state (tells you success/failure, sprint count)
      2. `$ARTIFACTS_DIR/spec.md` — the original product spec
      3. All files in `$ARTIFACTS_DIR/contracts/` — sprint contracts (use Glob to find them)
      4. All files in `$ARTIFACTS_DIR/feedback/` — evaluation results (use Glob to find them)

      ## Generate a report covering:

      ### Build Summary
      - What application was built (from the spec)
      - Final status: did all sprints pass or did it fail? On which sprint?
      - Total sprints completed vs planned

      ### Per-Sprint Breakdown
      For each sprint that was attempted:
      - What the contract required (features + key criteria)
      - How many attempts were needed (retry count)
      - Final scores for each criterion
      - Key feedback that drove retries and improvements

      ### Quality Metrics
      - Average score across all final-round criteria
      - Which criteria required the most retries
      - Where the adversarial evaluator pushed quality the highest

      ### How to Run
      - The application code lives in: `$ARTIFACTS_DIR/app/`
      - Include the tech stack and how to start the app (from the spec)
      - Include any setup steps (install deps, env vars, etc.)

      Write this report to `$ARTIFACTS_DIR/report.md` AND output it as your response so the user
      sees it directly.
    allowed_tools: [Read, Write, Glob, Grep]
