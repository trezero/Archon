name: archon-architect
description: |
  Use when: User wants an architectural sweep, complexity reduction, or codebase health improvement.
  Triggers: "architect", "simplify codebase", "reduce complexity", "architectural sweep",
            "clean up architecture", "codebase health", "fix architecture".
  Does: Scans codebase metrics -> analyzes architecture with principled lens -> plans targeted
        simplifications -> executes fixes with self-review loops (hooks) -> validates -> creates PR.
  NOT for: Single-file fixes, feature development, bug fixes, PR reviews.

  DAG workflow showcasing per-node hooks:
  - PostToolUse hooks create organic quality loops (lint after write, self-review)
  - PreToolUse hooks inject architectural principles before changes
  - Different nodes have different trust levels and steering

provider: claude

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: MEASURE
  # Gather raw metrics — file sizes, complexity hotspots, dependency fan-out
  # ═══════════════════════════════════════════════════════════════

  - id: scan-metrics
    bash: |
      echo "=== FILE SIZE HOTSPOTS (top 30 largest source files) ==="
      find . -name '*.ts' -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/dist/*' \
        -exec wc -l {} + 2>/dev/null | sort -rn | head -30

      echo ""
      echo "=== IMPORT FAN-OUT (files with most imports) ==="
      for f in $(find . -name '*.ts' -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/dist/*'); do
        count=$(grep -c "^import " "$f" 2>/dev/null) || count=0
        if [ "$count" -gt 8 ]; then
          echo "$count imports: $f"
        fi
      done | sort -rn | head -20

      echo ""
      echo "=== EXPORT FAN-OUT (files with most exports) ==="
      for f in $(find . -name '*.ts' -not -path '*/node_modules/*' -not -path '*/.git/*' -not -path '*/dist/*'); do
        count=$(grep -c "^export " "$f" 2>/dev/null) || count=0
        if [ "$count" -gt 5 ]; then
          echo "$count exports: $f"
        fi
      done | sort -rn | head -20

      echo ""
      echo "=== FUNCTION LENGTH HOTSPOTS (functions over 50 lines) ==="
      grep -rn "^\(export \)\?\(async \)\?function \|=> {$" \
        --include='*.ts' --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist . 2>/dev/null \
        | head -30

      echo ""
      echo "=== TYPE SAFETY GAPS ==="
      echo "any usage:"
      grep -rn ": any\b\|as any\b" --include='*.ts' --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist . 2>/dev/null | wc -l
      echo "eslint-disable comments:"
      grep -rn "eslint-disable" --include='*.ts' --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist . 2>/dev/null | wc -l
    timeout: 60000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: ANALYZE
  # Read through hotspots with an architectural lens
  # Hooks inject assessment criteria after every file read
  # ═══════════════════════════════════════════════════════════════

  - id: analyze
    prompt: |
      You are a senior software architect performing a codebase health assessment.

      ## Codebase Metrics

      $scan-metrics.output

      ## User Focus

      $ARGUMENTS

      ## Instructions

      1. Read the top 10-15 files flagged by the metrics above (largest, most imports, most exports)
      2. For each file, assess the criteria injected after you read it (you'll see them)
      3. Build a running list of architectural concerns
      4. Focus on:
         - Modules doing too many things (SRP violations)
         - Abstractions that don't earn their complexity
         - Duplicated patterns that should be consolidated (Rule of Three)
         - God files or god functions
         - Leaky abstractions or tight coupling between layers
         - Dead code or unused exports
      5. Do NOT suggest changes yet — only diagnose

      ## Output

      Write a structured assessment to $ARTIFACTS_DIR/architecture-assessment.md with:
      - Executive summary (3-5 sentences)
      - Top findings ranked by impact
      - For each finding: file, what's wrong, why it matters, estimated effort
    depends_on: [scan-metrics]
    context: fresh
    denied_tools: [Write, Edit, Bash]
    hooks:
      PostToolUse:
        - matcher: "Read"
          response:
            hookSpecificOutput:
              hookEventName: PostToolUse
              additionalContext: >
                For the file you just read, assess:
                (1) Single responsibility — does this module do exactly one thing?
                (2) Cognitive load — could a new team member understand this in 5 minutes?
                (3) Abstraction value — does every abstraction earn its complexity, or is it premature?
                (4) Dependency direction — does this file depend on things at its own level or below, not above?
                Add any concerns to your running list. Be specific — cite line ranges and function names.

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: PLAN
  # Prioritize and scope the changes — pure reasoning, no tools
  # ═══════════════════════════════════════════════════════════════

  - id: plan
    prompt: |
      You are planning targeted architectural improvements.

      ## Assessment

      $analyze.output

      ## Principles

      - KISS: prefer straightforward over clever
      - YAGNI: remove speculative abstractions
      - Rule of Three: only extract when a pattern appears 3+ times
      - Each change must be independently revertable
      - Do NOT mix refactoring with behavior changes
      - Scope to what can be done safely in one pass (max 5-7 files)

      ## Instructions

      1. From the assessment, select the top 3-5 highest-impact, lowest-risk improvements
      2. For each, write a precise plan: which file, what to change, why
      3. Order them so each change is independent (no cascading dependencies between changes)
      4. Estimate blast radius — how many other files are affected

      ## Output

      Write the plan as a numbered list. Be specific about exactly what code to change.
      Keep it concise — the implement node will follow this literally.
    depends_on: [analyze]
    allowed_tools: [Read]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: EXECUTE
  # Make the changes with hooks creating quality feedback loops
  # ═══════════════════════════════════════════════════════════════

  - id: simplify
    prompt: |
      You are implementing targeted architectural simplifications.

      ## Plan

      $plan.output

      ## Rules

      - Follow the plan exactly — do not add extra improvements you notice along the way
      - Each change must preserve existing behavior (refactor only, no feature changes)
      - After each file edit, you'll be prompted to validate — follow those instructions
      - If a change turns out to be harder than expected, skip it and move on
      - Commit each logical change separately with a clear commit message

      ## Instructions

      1. Work through the plan items in order
      2. For each item: read the file, make the change, follow the post-edit checklist
      3. After all changes, do a final `git diff --stat` to verify scope
    depends_on: [plan]
    context: fresh
    hooks:
      PreToolUse:
        - matcher: "Write|Edit"
          response:
            hookSpecificOutput:
              hookEventName: PreToolUse
              additionalContext: >
                Before writing: Is this file in your plan? If not, explain why you're
                touching it. Check how many files import from this module — changes to
                widely-imported modules need extra scrutiny.
      PostToolUse:
        - matcher: "Write|Edit"
          response:
            systemMessage: >
              You just modified a file. Do these things NOW before moving on:
              1. Run the type checker to verify your change compiles
              2. Re-read the file you changed — is it ACTUALLY simpler, or did you just move complexity around?
              3. State in ONE sentence why this change reduces complexity. If you cannot justify it, revert it.
        - matcher: "Read"
          response:
            hookSpecificOutput:
              hookEventName: PostToolUse
              additionalContext: >
                Before modifying this file, consider: will your change reduce or increase
                the number of concepts a reader needs to hold in their head?
        - matcher: "Bash"
          response:
            hookSpecificOutput:
              hookEventName: PostToolUse
              additionalContext: >
                Check the exit code. If the command failed, diagnose the root cause
                before attempting a fix. Do not blindly retry.

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: VALIDATE
  # Run full validation suite — bash only, cannot edit to "fix" failures
  # ═══════════════════════════════════════════════════════════════

  - id: validate
    bash: |
      echo "=== TYPE CHECK ==="
      bun run type-check 2>&1
      TC_EXIT=$?

      echo ""
      echo "=== LINT ==="
      bun run lint 2>&1
      LINT_EXIT=$?

      echo ""
      echo "=== TESTS ==="
      bun run test 2>&1
      TEST_EXIT=$?

      echo ""
      echo "=== RESULTS ==="
      echo "Type check: $([ $TC_EXIT -eq 0 ] && echo 'PASS' || echo 'FAIL')"
      echo "Lint: $([ $LINT_EXIT -eq 0 ] && echo 'PASS' || echo 'FAIL')"
      echo "Tests: $([ $TEST_EXIT -eq 0 ] && echo 'PASS' || echo 'FAIL')"

      # Always exit 0 so downstream nodes can read output and decide
      if [ $TC_EXIT -eq 0 ] && [ $LINT_EXIT -eq 0 ] && [ $TEST_EXIT -eq 0 ]; then
        echo "VALIDATION_STATUS: PASS"
      else
        echo "VALIDATION_STATUS: FAIL"
      fi
    depends_on: [simplify]
    timeout: 300000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: FIX VALIDATION FAILURES (if any)
  # Only runs if validate failed — focused fix with same quality hooks
  # ═══════════════════════════════════════════════════════════════

  - id: fix-failures
    prompt: |
      Review the validation output below.

      ## Validation Output

      $validate.output

      ## Instructions

      If the output ends with "VALIDATION_STATUS: PASS", respond with
      "All checks passed — no fixes needed." and stop.

      If there are failures:

      1. Read the validation failures carefully
      2. Fix ONLY what's broken — do not make additional improvements
      3. If a fix requires changing behavior (not just fixing a type/lint error),
         revert the original change instead
      4. Run the specific failing check after each fix to confirm it passes
      5. After all fixes, run the full validation suite: `bun run validate`
    depends_on: [validate]
    context: fresh
    hooks:
      PostToolUse:
        - matcher: "Write|Edit"
          response:
            systemMessage: >
              You just made a fix. Run the specific failing validation check NOW
              to verify your fix works. Do not batch fixes — verify each one.
      PreToolUse:
        - matcher: "Write|Edit"
          response:
            hookSpecificOutput:
              hookEventName: PreToolUse
              additionalContext: >
                You are fixing validation failures only. Do not make any changes
                beyond what's needed to pass the failing checks. If in doubt, revert
                the original change that caused the failure.

  # ═══════════════════════════════════════════════════════════════
  # PHASE 7: CREATE PR
  # Hooks ensure this node only does git operations
  # ═══════════════════════════════════════════════════════════════

  - id: create-pr
    prompt: |
      Create a pull request for the architectural improvements.

      ## Context

      - Architecture assessment: $analyze.output
      - Plan: $plan.output
      - Validation: $validate.output

      ## Instructions

      1. Stage all changes and create a single commit (or verify existing commits)
      2. Push the branch: `git push -u origin HEAD`
      3. Check if a PR already exists: `gh pr list --head $(git branch --show-current)`
      4. Create the PR with:
         - Title: concise description of what was simplified (under 70 chars)
         - Body: use the format below
      5. Save the PR URL to `$ARTIFACTS_DIR/.pr-url`

      ## PR Body Format

      ```markdown
      ## Architectural Sweep

      **Focus**: $ARGUMENTS

      ### Assessment

      [3-5 sentence summary from the architecture assessment]

      ### Changes

      [For each change: what file, what was simplified, why]

      ### Validation

      - [x] Type check passes
      - [x] Lint passes
      - [x] Tests pass
      - [x] Each change preserves existing behavior
      ```
    depends_on: [fix-failures]
    context: fresh
    hooks:
      PreToolUse:
        - matcher: "Write|Edit"
          response:
            hookSpecificOutput:
              hookEventName: PreToolUse
              permissionDecision: deny
              permissionDecisionReason: "PR creation node — do not modify source files. Use only git and gh commands."
      PostToolUse:
        - matcher: "Bash"
          response:
            hookSpecificOutput:
              hookEventName: PostToolUse
              additionalContext: >
                Verify this command succeeded. If git push or gh pr create failed,
                read the error message carefully before retrying.
