name: archon-fix-github-issue
description: |
  Use when: User wants to FIX, RESOLVE, or IMPLEMENT a solution for a GitHub issue.
  Triggers: "fix this issue", "implement issue #123", "resolve this bug", "fix it".
  NOT for: Comprehensive multi-agent reviews (use archon-issue-review-full),
           questions about issues, CI failures, PR reviews, general exploration.

  Workflow:
  1. Investigate issue → root cause analysis, implementation plan
  2. Fix code → implement changes, validate, commit
  3. Create PR → push and create pull request
  4. Code review → single agent review with PR comment
  5. Auto-fix → fix all surfaced findings, skip YAGNI, post fix report

steps:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: INVESTIGATE
  # ═══════════════════════════════════════════════════════════════════

  - command: archon-investigate-issue
    # Analyzes issue, creates investigation.md artifact
    # Posts analysis to GitHub issue

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: FIX
  # ═══════════════════════════════════════════════════════════════════

  - command: archon-fix-issue
    clearContext: true
    # Implements fix from investigation, commits (no PR)
    # Artifact: implementation.md

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: CREATE PR
  # ═══════════════════════════════════════════════════════════════════

  - command: archon-create-pr
    clearContext: true
    # Pushes branch, creates PR linked to issue

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: CODE REVIEW
  # ═══════════════════════════════════════════════════════════════════

  - command: archon-pr-review-scope
    clearContext: true
    # Gathers PR context, writes .pr-number and scope.md

  - command: archon-code-review-agent
    clearContext: true
    # Reviews code quality, produces findings artifact

  - command: archon-post-review-to-pr
    clearContext: true
    # Posts review findings as a comment on the PR

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: AUTO-FIX
  # ═══════════════════════════════════════════════════════════════════

  - command: archon-auto-fix-review
    clearContext: true
    # Reads all review artifacts, fixes all surfaced issues (skipping YAGNI),
    # commits and pushes to PR branch, posts fix report as GitHub comment
