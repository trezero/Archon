name: archon-piv-loop
description: |
  Use when: User wants guided Plan-Implement-Validate development with human-in-the-loop.
  Triggers: "piv", "piv loop", "plan implement validate", "guided development",
            "structured development", "build a feature", "develop with review".
  NOT for: Autonomous implementation without planning (use archon-feature-development).
  NOT for: PRD creation (use archon-interactive-prd).
  NOT for: Ralph story-based implementation (use archon-ralph-dag).

  Interactive PIV loop workflow — the foundational AI coding methodology:
  1. PLAN: Explore ideas with human (3 rounds) -> create structured plan -> review & revise (2 rounds)
  2. IMPLEMENT: Autonomous task-by-task implementation from plan (loop node)
  3. VALIDATE: Automated code review -> human review & feedback (2 rounds) -> final summary

  The PIV loop comes AFTER a PRD exists. Each PIV loop focuses on ONE granular feature or bug fix.
  Input: A description of what to build, a path to an existing plan, or a GitHub issue number.

provider: claude
interactive: true

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: PLAN — Exploration Round 1
  # Understand the idea, explore the codebase, ask key questions
  # ═══════════════════════════════════════════════════════════════

  - id: explore-1
    model: sonnet
    prompt: |
      # PIV Loop — Exploration (Round 1)

      You are a senior engineering partner starting a focused development session.
      Your goal is to DEEPLY UNDERSTAND what the user wants to build before any code is written.

      **User's request**: $ARGUMENTS

      ---

      ## Step 1: Parse the Input

      Determine what the user provided:

      **If it's a file path** (ends in `.md`, `.plan.md`, or `.prd.md`):
      - Read the file
      - If it's an existing plan → summarize it and ask if they want to refine or proceed to implementation
      - If it's a PRD → identify the specific phase/feature to focus on

      **If it's a GitHub issue** (`#123` format):
      - Fetch it: `gh issue view {number} --json title,body,labels,comments`
      - Summarize the issue context

      **If it's free text**:
      - This is a feature idea or bug description. Use it directly.

      ## Step 2: Explore the Codebase

      Before asking questions, DO YOUR HOMEWORK. Spend time understanding:

      1. **Read CLAUDE.md** — understand project conventions, architecture, and constraints
      2. **Search for related code** — find existing implementations similar to what the user wants
      3. **Read key files** — understand the current state of code the user wants to change
      4. **Check recent git history** — `git log --oneline -20` for recent changes in the area

      ## Step 3: Present Your Understanding

      Share what you found:

      ```
      ## What I Understand

      You want to: {restated understanding in 2-3 sentences}

      ## What Already Exists

      - {file:line} — {what it does and how it relates}
      - {file:line} — {what it does and how it relates}
      - {pattern/component} — {how it could be extended or reused}

      ## Initial Architecture Thoughts

      Based on what exists, I'm thinking:
      - {approach 1 — extend existing X}
      - {approach 2 — if approach 1 doesn't work}
      - {key architectural decision that needs your input}
      ```

      ## Step 4: Ask Targeted Questions

      Ask 4-6 questions that will reduce YOUR assumptions. Focus on:

      1. **Scope**: What's the exact boundary? What's explicitly NOT included?
      2. **Architecture**: Do you have a preference for how this should be structured?
      3. **Tech decisions**: Any specific libraries, patterns, or approaches you want?
      4. **Constraints**: Performance requirements? Backward compatibility? Timeline?
      5. **Existing code**: Should we extend {specific thing you found} or build fresh?
      6. **Testing**: What level of test coverage do you expect?

      **Rules:**
      - Be SPECIFIC — reference actual code you found, not generic questions
      - Don't ask questions you could answer by reading the code
      - Don't ask about things that are clearly stated in CLAUDE.md
      - Ask about DECISIONS, not information gathering

  # ═══════════════════════════════════════════════════════════════
  # GATE 1: User answers exploration questions
  # ═══════════════════════════════════════════════════════════════

  - id: explore-gate-1
    approval:
      message: |
        Answer the questions above. Share your thoughts on architecture, scope, and approach.
        Feel free to ask me to explore specific areas of the codebase or research specific topics.
        Your answers will guide a deeper investigation in the next round.
    depends_on: [explore-1]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1b: PLAN — Exploration Round 2
  # Go deeper based on user's answers, research specific topics
  # ═══════════════════════════════════════════════════════════════

  - id: explore-2
    model: sonnet
    depends_on: [explore-gate-1]
    prompt: |
      # PIV Loop — Exploration (Round 2)

      You are continuing the exploration phase of a PIV loop.
      The user has answered your initial questions — now go DEEPER.

      **Original request**: $ARGUMENTS
      **User's answers to Round 1 questions**: $explore-gate-1.output

      ---

      ## Step 1: Process the User's Answers

      Read their answers carefully. Identify:
      - Decisions they've made (tech stack, architecture, scope)
      - Areas they want you to explore further
      - Constraints or preferences they've stated
      - Questions they asked YOU back (answer these!)

      ## Step 2: Deep Research

      Based on their answers, do targeted research:

      1. **If they mentioned specific technologies** → search the web for current best practices,
         gotchas, and version-specific documentation
      2. **If they pointed you to specific code** → read it thoroughly, understand the patterns
      3. **If they asked you to explore an area** → do a thorough investigation with file reads
      4. **If they made architecture decisions** → validate those decisions against the codebase,
         flag any potential issues or conflicts

      Read actual files. Don't guess.

      ## Step 3: Present Findings and Refined Understanding

      ```
      ## Updated Understanding

      Based on your answers, here's where we stand:

      ### Decisions Made
      - {decision 1 — from their answers}
      - {decision 2 — from their answers}

      ### What I Investigated
      - {finding 1 — with file:line references}
      - {finding 2 — with actual code patterns found}

      ### Answers to Your Questions
      - {if they asked you anything, answer it here with evidence}

      ### Architecture Recommendation
      {Your refined recommendation based on everything so far}

      ### Remaining Concerns
      - {concern 1 — specific, not generic}
      - {concern 2 — things that could go wrong}
      ```

      ## Step 4: Final Clarification Questions

      Ask 2-4 focused questions about:
      - Any ambiguities that remain after their answers
      - Architecture concerns you identified during research
      - Specific implementation tradeoffs they should weigh in on
      - Success criteria — how will we know this is done correctly?

      **Keep it focused.** You should be converging toward a clear implementation picture,
      not expanding scope.

  # ═══════════════════════════════════════════════════════════════
  # GATE 2: User answers deep-dive questions
  # ═══════════════════════════════════════════════════════════════

  - id: explore-gate-2
    approval:
      message: |
        Review the findings and answer the remaining questions.
        If you have additional areas to explore, share them now.
        If you're satisfied with the exploration, just say so — I'll move on to final synthesis.
    depends_on: [explore-2]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1c: PLAN — Exploration Round 3 (Final Synthesis)
  # Consolidate everything, prepare for plan creation
  # ═══════════════════════════════════════════════════════════════

  - id: explore-3
    model: sonnet
    depends_on: [explore-gate-2]
    prompt: |
      # PIV Loop — Exploration (Round 3 — Final Synthesis)

      You are completing the exploration phase of a PIV loop.
      This is the final round before creating the structured plan.

      **Original request**: $ARGUMENTS
      **Round 1 answers**: $explore-gate-1.output
      **Round 2 answers**: $explore-gate-2.output

      ---

      ## Step 1: Process Round 2 Answers

      Read their latest answers. Handle two scenarios:

      **If they asked for more exploration:**
      - Do the additional research they requested
      - Answer their questions with evidence from the codebase
      - Present your findings clearly

      **If they said they're satisfied:**
      - Acknowledge and move to synthesis

      ## Step 2: Synthesize Everything

      Compile a complete picture of what we're building:

      ```
      ## Implementation Summary

      ### What We're Building
      {Clear, specific description — not vague}

      ### Scope Boundary
      - IN: {what's included}
      - OUT: {what's explicitly excluded}

      ### Architecture
      - {key architectural decision 1}
      - {key architectural decision 2}
      - {patterns to follow from existing codebase}

      ### Files That Will Change
      - `{file}` — {what changes and why}
      - `{file}` — {what changes and why}
      - `{new file if needed}` — {purpose}

      ### Success Criteria
      - [ ] {specific, testable criterion 1}
      - [ ] {specific, testable criterion 2}
      - [ ] All validation passes (type-check, lint, tests, format)

      ### Key Risks
      - {risk 1 — and how we'll mitigate it}
      - {risk 2 — and how we'll mitigate it}

      ### Testing Strategy
      - {what tests to write}
      - {what manual validation to do}
      ```

      ## Step 3: Confirm Readiness

      Present this summary and ask:

      "This is everything I'll use to create the structured implementation plan.
      Any corrections, additions, or concerns before I create the plan?"

      If any important decisions are still unmade, call them out explicitly.

  # ═══════════════════════════════════════════════════════════════
  # GATE 3: Final confirmation before plan creation
  # ═══════════════════════════════════════════════════════════════

  - id: explore-gate-3
    approval:
      message: |
        Review the implementation summary above.
        Provide any final corrections or additions, or confirm you're ready for the structured plan.
    depends_on: [explore-3]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: PLAN — Create Structured Plan
  # Generate the full implementation plan document
  # ═══════════════════════════════════════════════════════════════

  - id: create-plan
    model: sonnet
    depends_on: [explore-gate-3]
    prompt: |
      # PIV Loop — Create Structured Plan

      You are creating a structured implementation plan from the completed exploration phase.
      This plan will be the SOLE GUIDE for the implementation agent — it must be complete,
      specific, and actionable.

      **Original request**: $ARGUMENTS
      **Exploration Round 1 answers**: $explore-gate-1.output
      **Exploration Round 2 answers**: $explore-gate-2.output
      **Final synthesis feedback**: $explore-gate-3.output

      ---

      ## Step 1: Read the Codebase (Again)

      Before writing the plan, verify your understanding is current:

      1. **Read CLAUDE.md** — capture all relevant conventions
      2. **Read every file you plan to change** — note exact current state
      3. **Read example test files** — understand testing patterns
      4. **Check for any files created since exploration** — `git status`

      ## Step 2: Determine Plan Location

      Generate a kebab-case slug from the feature name.
      Save to `.claude/archon/plans/{slug}.plan.md`.

      Create the directory if needed:
      ```bash
      mkdir -p .claude/archon/plans
      ```

      ## Step 3: Write the Plan

      Use this exact template. Fill EVERY section with specific, verified information.
      If something is unknown, write "TBD — needs investigation" not filler.

      ```markdown
      # Feature: {Title}

      ## Summary

      {1-2 sentences: what changes and why}

      ## Mission

      {The core goal in one clear statement. What does success look like?}

      ## Success Criteria

      - [ ] {Specific, testable criterion — not vague}
      - [ ] {Another specific criterion}
      - [ ] All validation passes (`bun run validate` or equivalent)
      - [ ] No regressions in existing tests

      ## Scope

      ### In Scope
      - {What we ARE building — be specific}

      ### Out of Scope
      - {What we are NOT building — and why}

      ## Codebase Context

      ### Key Files

      | File | Role | Action |
      |------|------|--------|
      | `{path}` | {what it does} | CREATE / UPDATE |

      ### Patterns to Follow

      {Actual code snippets from the codebase that the implementation should mirror}

      ```{language}
      // SOURCE: {file}:{lines}
      {actual code}
      ```

      ### Dependencies

      - {What must exist before implementation starts}
      - {External libraries needed, if any}

      ## Architecture

      {Key architectural decisions made during exploration}

      - {Decision 1 — with rationale}
      - {Decision 2 — with rationale}

      ## Task List

      Execute in order. Each task is atomic and independently verifiable.

      ### Task 1: {ACTION} `{file path}`

      **Action**: CREATE / UPDATE
      **Details**: {Exact changes — specific enough for an agent with no context}
      **Pattern**: Follow `{source file}:{lines}`
      **Validate**: `{command to verify this task}`

      ### Task 2: {ACTION} `{file path}`

      ...

      ## Testing Strategy

      ### Tests to Write

      | Test File | Test Cases | Validates |
      |-----------|-----------|-----------|
      | `{path}` | {cases} | {what it validates} |

      ### Manual Validation

      {Specific commands to run, endpoints to test, UI flows to verify}

      ## Validation Commands

      1. Type check: `{command}`
      2. Lint: `{command}`
      3. Tests: `{command}`
      4. Full validation: `{command}`
      5. Manual: `{specific verification steps}`

      ## Risks

      | Risk | Impact | Mitigation |
      |------|--------|------------|
      | {risk} | {HIGH/MED/LOW} | {specific mitigation} |
      ```

      ## Step 4: Verify the Plan

      After writing the plan file:

      1. **Check every file path** referenced in the plan — verify they exist
      2. **Check every pattern** cited — verify the code matches
      3. **Check task ordering** — ensure dependencies are respected
      4. **Check completeness** — could an agent with NO context implement this plan?

      ## Step 5: Report

      Output:
      ```
      ## Plan Created

      **File**: `.claude/archon/plans/{slug}.plan.md`
      **Tasks**: {count}
      **Files to change**: {count}
      **Confidence**: {1-10}/10

      Key decisions:
      - {decision 1}
      - {decision 2}

      Please review the plan and provide feedback.
      ```

  # ═══════════════════════════════════════════════════════════════
  # GATE 4: Human reviews the plan
  # ═══════════════════════════════════════════════════════════════

  - id: plan-review-gate
    approval:
      message: |
        Review the structured plan document. Check:
        - Are the success criteria correct and complete?
        - Is the task list in the right order?
        - Are there missing tasks or unnecessary ones?
        - Is the testing strategy adequate?
        - Are the architectural decisions sound?

        Provide specific feedback on what to change, or say "approved" to proceed.
    depends_on: [create-plan]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2b: PLAN — Revise Plan Based on Feedback
  # ═══════════════════════════════════════════════════════════════

  - id: revise-plan
    model: sonnet
    depends_on: [plan-review-gate]
    prompt: |
      # PIV Loop — Revise Structured Plan

      The user has reviewed the implementation plan and provided feedback.
      Your job is to incorporate their feedback precisely.

      **User's feedback**: $plan-review-gate.output

      ---

      ## Step 1: Find the Plan

      Look in `.claude/archon/plans/` for the most recently created `.plan.md` file:
      ```bash
      ls -t .claude/archon/plans/*.plan.md 2>/dev/null | head -1
      ```

      Read the entire plan file.

      ## Step 2: Process Feedback

      **If the user said "approved" or similar** (ready to proceed):
      - Make no changes to the plan
      - Output: "Plan approved. Proceeding to implementation."
      - Done.

      **If the user provided specific feedback:**
      - Parse each piece of feedback
      - For each item, edit the plan file directly
      - Add/remove/modify tasks as requested
      - Update success criteria if needed
      - Adjust testing strategy if needed
      - Re-verify file paths and patterns after changes

      ## Step 3: Show Changes

      After editing, summarize what changed:

      ```
      ## Plan Revised

      Changes made:
      - {change 1}
      - {change 2}

      Updated stats:
      - Tasks: {count}
      - Files to change: {count}

      Please review the updated plan.
      ```

  # ═══════════════════════════════════════════════════════════════
  # GATE 5: Final plan approval
  # ═══════════════════════════════════════════════════════════════

  - id: plan-final-gate
    approval:
      message: |
        Review the revised plan (or confirm the approval).
        Say "approved" to begin implementation, or provide more feedback for a final revision.
    depends_on: [revise-plan]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2c: PLAN — Final Revision (if needed)
  # Handle any last feedback before implementation
  # ═══════════════════════════════════════════════════════════════

  - id: final-plan-revision
    model: sonnet
    depends_on: [plan-final-gate]
    context: fresh
    prompt: |
      # PIV Loop — Final Plan Revision

      The user provided final feedback on the implementation plan.

      **User's feedback**: $plan-final-gate.output

      ---

      ## Instructions

      Find the plan file:
      ```bash
      ls -t .claude/archon/plans/*.plan.md 2>/dev/null | head -1
      ```

      Read it entirely.

      **If the user said "approved" or confirmed:**
      - Output the plan file path
      - Output: "Plan finalized. Beginning implementation."

      **If the user provided more feedback:**
      - Apply the changes to the plan file
      - Summarize what changed
      - Output the plan file path

      The implementation phase will use this plan as its sole guide.

      Output the plan file path on its own line at the end:
      ```
      PLAN_FILE: {path}
      ```

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT — Setup
  # Read the plan, prepare the environment
  # ═══════════════════════════════════════════════════════════════

  - id: implement-setup
    depends_on: [final-plan-revision]
    bash: |
      set -e

      # Find the plan file
      PLAN_FILE=$(ls -t .claude/archon/plans/*.plan.md 2>/dev/null | head -1)

      if [ -z "$PLAN_FILE" ]; then
        echo "ERROR: No plan file found in .claude/archon/plans/"
        exit 1
      fi

      # Install dependencies if in a worktree
      if [ -f "bun.lock" ] || [ -f "bun.lockb" ]; then
        echo "Installing dependencies..."
        bun install --frozen-lockfile 2>&1 | tail -3
      elif [ -f "package-lock.json" ]; then
        npm ci 2>&1 | tail -3
      elif [ -f "yarn.lock" ]; then
        yarn install --frozen-lockfile 2>&1 | tail -3
      elif [ -f "pnpm-lock.yaml" ]; then
        pnpm install --frozen-lockfile 2>&1 | tail -3
      fi

      # Git state
      echo "BRANCH=$(git branch --show-current)"
      echo "GIT_ROOT=$(git rev-parse --show-toplevel)"
      echo "PLAN_FILE=$PLAN_FILE"

      # Output the plan content
      echo "=== PLAN_START ==="
      cat "$PLAN_FILE"
      echo ""
      echo "=== PLAN_END ==="

      # Count tasks
      TASK_COUNT=$(grep -c "^### Task [0-9]" "$PLAN_FILE" || true)
      echo "TASK_COUNT=${TASK_COUNT:-0}"

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT — Task-by-Task Loop
  # Fresh context each iteration. Reads plan from disk.
  # One task per iteration. Validates before committing.
  # ═══════════════════════════════════════════════════════════════

  - id: implement
    depends_on: [implement-setup]
    idle_timeout: 600000
    loop:
      prompt: |
        # PIV Loop — Implementation Agent

        You are an autonomous coding agent in a FRESH session — no memory of previous iterations.
        Your job: Read the plan from disk, implement ONE task, validate, commit, update tracking, exit.

        **Golden Rule**: If validation fails, fix it before committing. Never commit broken code.

        ---

        ## Phase 0: CONTEXT — Load State

        The setup node produced this context:

        $implement-setup.output

        **User's original request**: $USER_MESSAGE

        ---

        ### 0.1 Parse Plan File

        Extract the `PLAN_FILE=...` line from the context above.

        ### 0.2 Read Current State (from disk — not from context above)

        The context above is a snapshot from before the loop started. Previous iterations may have changed things.
        **You MUST re-read from disk:**

        1. **Read the plan file** — your implementation guide
        2. **Read progress tracking** — check if a `.claude/archon/plans/progress.txt` exists
           with completed task tracking from prior iterations
        3. **Read CLAUDE.md** — project conventions and constraints

        ### 0.3 Check Git State

        ```bash
        git log --oneline -10
        git status
        ```

        Look for commits from previous iterations to understand what's already done.

        ---

        ## Phase 1: SELECT — Pick Next Task

        ### 1.1 Find the Next Task

        From the plan file, identify tasks by `### Task N:` headers.
        Cross-reference with:
        - Commits from previous iterations (git log)
        - The progress tracking file (if it exists)
        - Actual file state (files that already exist or have been modified)

        **If ALL tasks are complete** → Skip to Phase 5 (Completion).

        **If tasks remain but depend on incomplete prerequisites** →
        Report the blocker and end the iteration.

        ### 1.2 Announce Selection

        ```
        -- Task Selected ------------------------------------------------
        Task: {N} — {task title}
        Action: {CREATE / UPDATE}
        File: {file path}
        Validate: {validation command from plan}
        -----------------------------------------------------------------
        ```

        ---

        ## Phase 2: IMPLEMENT — Execute the Task

        ### 2.1 Read Before Writing

        Before making ANY changes:
        1. Read the file you're about to change (if it exists)
        2. Read the pattern file referenced in the plan's "Pattern" field
        3. Understand the current state completely

        ### 2.2 Make Changes

        Follow the plan's instructions EXACTLY:
        - Use the specified patterns
        - Follow the imports listed
        - Watch for the gotchas mentioned
        - Keep changes minimal and focused on THIS task only

        ### 2.3 Type-Check After Each File

        After modifying each file:
        ```bash
        bun run type-check 2>&1 || true
        ```

        If types fail, fix them before moving to the next file.

        ---

        ## Phase 3: VALIDATE — Verify the Task

        Run the validation command specified in the plan for this task.
        Then run the full validation suite:

        ```bash
        bun run type-check && bun run lint && bun run test && bun run format:check
        ```

        **If validation fails:**
        1. Read the error output carefully
        2. Fix the issue in your implementation
        3. Re-run validation
        4. Repeat until clean (up to 3 attempts)

        **If you can't fix after 3 attempts:**
        - Note the issue in progress tracking
        - Do NOT commit broken code
        - End the iteration

        ---

        ## Phase 4: COMMIT — Save Changes

        ### 4.1 Stage and Review

        ```bash
        git add -A
        git status
        git diff --cached --stat
        ```

        Verify only expected files are staged.

        ### 4.2 Commit

        ```bash
        git commit -m "$(cat <<'EOF'
        {type}: {task description}

        PIV Task {N}: {brief details}

        Changes:
        - {change 1}
        - {change 2}
        EOF
        )"
        ```

        Use: `feat:` for features, `fix:` for bugs, `refactor:` for refactors, `test:` for tests.

        ### 4.3 Track Progress

        Append to `.claude/archon/plans/progress.txt`:

        ```
        ## Task {N}: {title} — COMPLETED
        Date: {ISO date}
        Files: {list of files changed}
        Commit: {short hash}
        Notes: {any learnings or gotchas encountered}
        ---
        ```

        ---

        ## Phase 5: COMPLETE — Check All Tasks

        Re-read the plan file. Count remaining tasks by checking progress tracking
        and git log against the task list.

        ### If ALL Tasks Are Done:

        1. Run full validation one final time:
           ```bash
           bun run validate 2>&1 || bun run type-check && bun run lint && bun run test
           ```

        2. Push the branch:
           ```bash
           git push -u origin HEAD
           ```

        3. Signal completion:
           ```
           <promise>COMPLETE</promise>
           ```

        ### If Tasks Remain:

        Report status and end normally:
        ```
        -- Iteration Complete ------------------------------------------
        Task completed: {N} — {title}
        Tasks remaining: {count}
        Next task: {N+1} — {title}
        -----------------------------------------------------------------
        ```

        The loop engine will start the next iteration with a fresh context.

        ---

        ## Edge Cases

        ### Validation fails repeatedly
        - If the same error persists after 3 fix attempts, note it and end the iteration
        - The next iteration (fresh context) may approach it differently

        ### Task is too large
        - Implement the core change that satisfies the plan's requirements
        - Don't add extras not specified in the plan

        ### Pre-existing failures
        - If tests were failing BEFORE your changes, note them but don't fix unrelated code
        - Document pre-existing failures in progress tracking

        ---

        ## Success Criteria

        - **ONE_TASK**: Exactly one task implemented per iteration
        - **VALIDATED**: Full validation passes before commit
        - **COMMITTED**: Changes committed with clear message
        - **TRACKED**: Progress file updated
        - **NO_SCOPE_CREEP**: Only what the plan specifies, nothing more
      until: COMPLETE
      max_iterations: 15
      fresh_context: true

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: VALIDATE — Automated Code Review
  # Review all changes against the plan before human review
  # ═══════════════════════════════════════════════════════════════

  - id: code-review
    model: sonnet
    depends_on: [implement]
    context: fresh
    prompt: |
      # PIV Loop — Automated Code Review

      The implementation phase is complete. Review ALL changes against the plan
      before the human reviews.

      **Implementation loop output**: $implement.output

      ---

      ## Step 1: Find the Plan

      ```bash
      ls -t .claude/archon/plans/*.plan.md 2>/dev/null | head -1
      ```

      Read the plan file entirely.

      ## Step 2: Review All Changes

      ```bash
      git log --oneline --no-merges $(git merge-base HEAD $BASE_BRANCH)..HEAD
      git diff $BASE_BRANCH..HEAD --stat
      git diff $BASE_BRANCH..HEAD
      ```

      ## Step 3: Check Against Plan

      For EACH task in the plan:
      1. Was it implemented? Check the git log and diff.
      2. Does the implementation match what was specified?
      3. Are the success criteria met?

      For EACH file changed:
      1. Read the file
      2. Check code quality — naming, patterns, error handling
      3. Check for security issues (injection, XSS, etc.)
      4. Check for missing edge cases
      5. Verify it follows CLAUDE.md conventions

      ## Step 4: Run Validation

      ```bash
      bun run validate 2>&1 || (bun run type-check && bun run lint && bun run test && bun run format:check)
      ```

      ## Step 5: Fix Obvious Issues

      If you find:
      - **Type errors** → fix them
      - **Lint warnings** → fix them
      - **Missing imports** → add them
      - **Formatting issues** → run `bun run format`

      Commit any fixes:
      ```bash
      git add -A && git commit -m "fix: address code review findings" 2>/dev/null || true
      ```

      ## Step 6: Present Review

      ```
      ## Code Review Complete

      ### Implementation Status

      | Task | Status | Notes |
      |------|--------|-------|
      | {task 1} | DONE / PARTIAL / MISSING | {notes} |

      ### Success Criteria

      | Criterion | Met? | Evidence |
      |-----------|------|----------|
      | {criterion} | YES / NO | {how verified} |

      ### Validation Results

      - Type-check: PASS / FAIL
      - Lint: PASS / FAIL
      - Tests: PASS / FAIL ({passed}/{total})
      - Format: PASS / FAIL

      ### Code Quality Findings

      {List any issues found — bugs, patterns not followed, missing tests, etc.}
      {If none: "No issues found."}

      ### Files Changed

      {git diff --stat output}

      ### Recommendation

      {READY FOR REVIEW / NEEDS FIXES — with specific items}
      ```

      The human reviewer will see this report and test the application themselves.

  # ═══════════════════════════════════════════════════════════════
  # GATE 6: Human validates the implementation
  # ═══════════════════════════════════════════════════════════════

  - id: validation-gate-1
    approval:
      message: |
        Review the code review report above and test the implementation yourself.
        - Run the application and verify it works as expected
        - Check the code changes (git diff)
        - Test edge cases and error scenarios

        Provide specific feedback on what needs fixing, or say "approved" if everything looks good.
    depends_on: [code-review]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4b: VALIDATE — Address Human Feedback
  # Fix issues the human identified
  # ═══════════════════════════════════════════════════════════════

  - id: fix-feedback
    model: sonnet
    depends_on: [validation-gate-1]
    context: fresh
    prompt: |
      # PIV Loop — Address Validation Feedback

      The human has reviewed the implementation and provided feedback.

      **Human's feedback**: $validation-gate-1.output

      ---

      ## Step 1: Read Context

      Read the plan file:
      ```bash
      ls -t .claude/archon/plans/*.plan.md 2>/dev/null | head -1
      ```

      Read CLAUDE.md for conventions.

      ## Step 2: Process Feedback

      **If the user said "approved" or similar:**
      - Output: "Implementation approved! Preparing final summary."
      - Skip to final output.

      **If the user provided specific feedback:**
      Parse each piece of feedback and address it:

      1. Read the relevant files
      2. Understand the issue
      3. Make the fix
      4. Verify the fix works

      For each fix:
      ```bash
      bun run type-check 2>&1
      ```

      ## Step 3: Full Validation After Fixes

      ```bash
      bun run validate 2>&1 || (bun run type-check && bun run lint && bun run test && bun run format:check)
      ```

      ## Step 4: Commit Fixes

      If changes were made:
      ```bash
      git add -A
      git commit -m "$(cat <<'EOF'
      fix: address review feedback

      Changes:
      - {fix 1}
      - {fix 2}
      EOF
      )"
      ```

      ## Step 5: Report

      ```
      ## Feedback Addressed

      ### Changes Made
      - {fix 1 — what was wrong and how it was fixed}
      - {fix 2}

      ### Validation Results
      - Type-check: PASS / FAIL
      - Lint: PASS / FAIL
      - Tests: PASS / FAIL
      - Format: PASS / FAIL

      {If approved: "No changes needed — implementation was approved."}

      Ready for final review.
      ```

  # ═══════════════════════════════════════════════════════════════
  # GATE 7: Final human review
  # ═══════════════════════════════════════════════════════════════

  - id: validation-gate-2
    approval:
      message: |
        Review the fixes (or confirm the approval).
        Say "approved" to finalize, or provide additional feedback.
    depends_on: [fix-feedback]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4c: VALIDATE — Final Fixes and Wrap-up
  # Handle any last feedback, create summary
  # ═══════════════════════════════════════════════════════════════

  - id: final-fixes
    model: sonnet
    depends_on: [validation-gate-2]
    context: fresh
    prompt: |
      # PIV Loop — Final Validation

      The human provided final feedback.

      **Human's feedback**: $validation-gate-2.output

      ---

      ## Step 1: Handle Feedback

      **If the user said "approved":**
      - No code changes needed.

      **If the user provided more feedback:**
      - Read the relevant files
      - Make the fixes
      - Run validation:
        ```bash
        bun run validate 2>&1 || (bun run type-check && bun run lint && bun run test && bun run format:check)
        ```
      - Commit:
        ```bash
        git add -A
        git commit -m "fix: final review adjustments" 2>/dev/null || true
        ```

      ## Step 2: Push Changes

      ```bash
      git push -u origin HEAD 2>&1 || true
      ```

      ## Step 3: Generate Final Summary

      ```bash
      git log --oneline --no-merges $(git merge-base HEAD $BASE_BRANCH)..HEAD
      git diff --stat $(git merge-base HEAD $BASE_BRANCH)..HEAD
      ```

      Read the plan file and progress tracking.

      ## Step 4: Create PR (if not already created)

      Check if a PR exists:
      ```bash
      gh pr view HEAD --json url 2>/dev/null || echo "NO_PR"
      ```

      If no PR exists, create one:

      Read the plan file for context. Check for a PR template:
      ```bash
      cat .github/pull_request_template.md 2>/dev/null || cat .github/PULL_REQUEST_TEMPLATE.md 2>/dev/null || echo "NO_TEMPLATE"
      ```

      Create the PR using `gh pr create --draft --base $BASE_BRANCH` with:
      - Title from the plan's feature name
      - Body summarizing the implementation, referencing the plan file
      - Use a HEREDOC for the body

      ## Step 5: Output Summary

      ```
      ===============================================================
      PIV LOOP — COMPLETE
      ===============================================================

      Feature: {from plan}
      Plan: {plan file path}
      Branch: {branch name}
      PR: {url or "draft created at {url}"}

      -- Tasks Completed -----------------------------------------------
      {list of tasks from progress tracking}

      -- Commits -------------------------------------------------------
      {git log output}

      -- Files Changed -------------------------------------------------
      {git diff --stat output}

      -- Validation ----------------------------------------------------
      Type-check: PASS
      Lint: PASS
      Tests: PASS
      Format: PASS

      ===============================================================
      ```
