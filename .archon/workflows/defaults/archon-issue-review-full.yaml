name: archon-issue-review-full
description: |
  Use when: User wants a FULL, COMPREHENSIVE fix + review pipeline for a GitHub issue.
  Triggers: "full review", "comprehensive fix", "fix with full review", "deep review", "issue review full".
  NOT for: Simple issue fixes (use archon-fix-github-issue instead),
           questions about issues, CI failures, PR reviews, general exploration.

  Full workflow:
  1. Investigate issue -> root cause analysis, implementation plan
  2. Implement fix -> code changes, tests, PR creation
  3. Comprehensive review -> 5 parallel agents with scope awareness
  4. Fix review issues -> address CRITICAL/HIGH findings
  5. Final summary -> decision matrix, follow-up recommendations

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: INVESTIGATE
  # ═══════════════════════════════════════════════════════════════════

  - id: investigate
    command: archon-investigate-issue

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════════

  - id: implement
    command: archon-implement-issue
    depends_on: [investigate]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: CODE REVIEW
  # ═══════════════════════════════════════════════════════════════════

  - id: review-scope
    command: archon-pr-review-scope
    depends_on: [implement]
    context: fresh

  - id: sync
    command: archon-sync-pr-with-main
    depends_on: [review-scope]
    context: fresh

  - id: code-review
    command: archon-code-review-agent
    depends_on: [sync]
    context: fresh

  - id: error-handling
    command: archon-error-handling-agent
    depends_on: [sync]
    context: fresh

  - id: test-coverage
    command: archon-test-coverage-agent
    depends_on: [sync]
    context: fresh

  - id: comment-quality
    command: archon-comment-quality-agent
    depends_on: [sync]
    context: fresh

  - id: docs-impact
    command: archon-docs-impact-agent
    depends_on: [sync]
    context: fresh

  - id: synthesize
    command: archon-synthesize-review
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: FIX REVIEW ISSUES
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-fixes
    command: archon-implement-review-fixes
    depends_on: [synthesize]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINAL SUMMARY
  # ═══════════════════════════════════════════════════════════════════

  - id: summary
    command: archon-workflow-summary
    depends_on: [implement-fixes]
    context: fresh
