name: fix-github-issue
description: Investigate and fix a GitHub issue end-to-end. Composable workflow using reusable commands.

provider: claude
model: sonnet

steps:
  - command: investigate-issue
    # Git setup, analyze issue, create artifact, post to GitHub

  - command: implement-issue
    clearContext: true
    # Read artifact, make code changes, run validation

  - command: commit
    # Stage and commit changes

  - command: create-pr
    # Push and create PR with "Fixes #N"

  - command: review-pr
    clearContext: true
    # Review PR and post findings as comment
