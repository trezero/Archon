name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to known working version - newer versions have mock.module() issues
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Run tests with coverage
        # Run tests in specific order to avoid Bun mock.module() pollution:
        # 1. Run factory tests first (before any mock.module calls)
        # 2. Run client tests that use mock.module (claude, codex)
        # 3. Run command-handler tests (use mock.module for DB mocks)
        # 4. Run all other tests EXCEPT orchestrator and command-handler
        # 5. Run orchestrator tests last (mocks command-handler and factory)
        # Note: Tests are in packages/core/src/ and packages/server/src/ after monorepo restructure
        run: |
          bun test --coverage packages/core/src/clients/factory.test.ts
          bun test --coverage packages/core/src/clients/claude.test.ts packages/core/src/clients/codex.test.ts
          bun test --coverage packages/core/src/handlers
          bun test --coverage packages/core/src/db packages/core/src/utils packages/core/src/config packages/core/src/state packages/core/src/services packages/core/src/isolation packages/core/src/workflows packages/server/src/adapters
          bun test --coverage packages/core/src/orchestrator

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage/
          retention-days: 14
